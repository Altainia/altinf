services:
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data

  altinf:
    image: ghcr.io/altainia/altinf:latest
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - ALTINF_ADMIN_PASSWORD=${ALTINF_ADMIN_PASSWORD:-}

volumes:
  caddy_data: